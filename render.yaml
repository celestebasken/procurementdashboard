# Render Blueprint for the UC Dining Sustainability Dashboard.
# See README.md's "Deploying to Render" section for the full runbook,
# including how procurement.db gets onto the persistent disk (it's private
# campus data and is never in this git repo or the Docker image).
services:
  - type: web
    name: procurement-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter # cheapest plan that supports a persistent disk
    healthCheckPath: /_stcore/health
    disk:
      name: procurement-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PROCUREMENT_DB_PATH
        value: /var/data/procurement.db
      - key: SHOW_ADMIN_PAGE
        value: "false"
